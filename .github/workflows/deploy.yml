name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install mkdocs-material

      - name: Strip status:draft from published articles
        run: |
          python3 << 'EOF'
          import os
          import re

          lab_dir = "docs/lab"
          for fname in os.listdir(lab_dir):
              if not fname.endswith(".md"):
                  continue
              fpath = os.path.join(lab_dir, fname)
              with open(fpath, encoding="utf-8") as f:
                  content = f.read()
              updated = re.sub(r'\nstatus: draft', '', content)
              if updated != content:
                  with open(fpath, "w", encoding="utf-8") as f:
                      f.write(updated)
                  print(f"Stripped draft status: {fname}")
          EOF

      - name: Auto-update latest articles in index.md
        run: |
          python3 << 'EOF'
          import os
          import re

          lab_dir = "docs/lab"
          index_path = "docs/index.md"

          files = sorted(
              [f for f in os.listdir(lab_dir) if f.endswith(".md")],
              reverse=True
          )

          articles = []
          for fname in files:
              fpath = os.path.join(lab_dir, fname)
              with open(fpath, encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith("# "):
                          title = line[2:].strip()
                          link = f"lab/{fname}"
                          articles.append(f"- [{title}]({link})")
                          break

          new_block = "## 最新文章\n\n" + "\n".join(articles) + "\n"

          with open(index_path, encoding="utf-8") as f:
              content = f.read()

          pattern = r"## 最新文章\n.*?(?=\n## |\Z)"
          new_content = re.sub(pattern, new_block.rstrip(), content, flags=re.DOTALL)

          with open(index_path, "w", encoding="utf-8") as f:
              f.write(new_content)

          print("Updated articles:")
          for a in articles:
              print(a)
          EOF

      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - uses: actions/deploy-pages@v4
